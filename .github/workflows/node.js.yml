name: Template Backend CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    defaults:
      run:
        working-directory: /home/template/template-runner/_work/template/template

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies with Yarn
        run: yarn install --frozen-lockfile

      - name: Kill current session 
        run: tmux kill-session -t server

      - name: Kill current session 
        run: tmux attach -t server
